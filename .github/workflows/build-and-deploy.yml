name: Build and Deploy Mimir

# Mirrors Huginn's release model:
#   gh release create vX.Y.Z
#     → test → build → deploy-idle (dynamically resolved) → staging smoke
#   Then: make swap  (or run promote.yml workflow_dispatch)
#     → promote-prod.sh: SHA guard, CNAME swap, prod smoke
#
# Pipeline runs ONLY on published GitHub releases (not on every push).
# Push events only run tests + build (no EB deploy).
on:
  release:
    types: [published]
  workflow_dispatch:

env:
  DOCKERHUB_IMAGE: featurefactory/mimir-mcp
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}

jobs:
  # ── 1. Tests ──────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    env:
      MIMIR_ENV: test
      DJANGO_SETTINGS_MODULE: mimir.settings

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: mimir_test
          POSTGRES_USER: huginn
          POSTGRES_PASSWORD: huginn
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov pytest-html

      - name: Run database migrations
        run: python manage.py migrate --noinput

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --ignore=tests/e2e \
            --ignore=tests/integration/test_mcp_server_acceptance.py \
            --ignore=tests/integration/test_mcp_facade.py \
            --ignore=tests/integration/test_mcp_e2e_all_tools.py \
            --ignore=tests/unit/test_activity_graph_service.py \
            --cov=. \
            --cov-report=html \
            --cov-report=term \
            --cov-report=xml \
            --html=report.html \
            --self-contained-html

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: github.event_name != 'pull_request'
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-mimir

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            report.html
            htmlcov/


  # ── 2. Build and push Docker images ──────────────────────────────────────
  build-and-push:
    name: Build and Push Docker Images
    needs: test
    runs-on: ubuntu-latest
    if: always() && needs.test.result == 'success'

    outputs:
      image_suffix: ${{ steps.tag.outputs.suffix }}
      git_revision: ${{ steps.tag.outputs.revision }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configure AWS credentials
        if: vars.AWS_ACCOUNT_ID != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to AWS ECR
        if: vars.AWS_ACCOUNT_ID != ''
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image tag suffix
        id: tag
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          BRANCH=$(echo "${GITHUB_REF_NAME}" | tr '/' '-')
          SUFFIX="${BRANCH}-${SHORT_SHA}"
          echo "suffix=${SUFFIX}" >> $GITHUB_OUTPUT
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "revision=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          else
            echo "revision=${SUFFIX}" >> $GITHUB_OUTPUT
          fi
          if [[ "$GITHUB_REF" == "refs/heads/main" || "${{ github.event_name }}" == "release" ]]; then
            echo "latest=true" >> $GITHUB_OUTPUT
          else
            echo "latest=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and push web image → ECR
        if: vars.AWS_ACCOUNT_ID != ''
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/mimir:${{ steps.tag.outputs.suffix }}
            ${{ steps.tag.outputs.latest == 'true' && format('{0}/mimir:latest', steps.ecr-login.outputs.registry) || '' }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Build and push MCP facade image → Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.mcp
          push: true
          tags: |
            ${{ env.DOCKERHUB_IMAGE }}:${{ steps.tag.outputs.suffix }}
            ${{ steps.tag.outputs.latest == 'true' && format('{0}:latest', env.DOCKERHUB_IMAGE) || '' }}
          cache-from: type=gha,scope=mcp-facade
          cache-to: type=gha,scope=mcp-facade,mode=max
          platforms: linux/amd64,linux/arm64

  # ── 3. Deploy to idle EB env + staging smoke ─────────────────────────────
  deploy-idle:
    name: Deploy to Idle EB env (staging smoke)
    # Deploys to whichever env is currently idle (dynamically resolved by CNAME).
    # Does NOT swap prod. Run "make swap" locally, or trigger promote.yml, after review.
    needs: build-and-push
    runs-on: ubuntu-latest
    # Only on published release or manual dispatch — not on every push to main.
    if: >
      vars.AWS_ACCOUNT_ID != '' && (
        github.event_name == 'release' ||
        github.event_name == 'workflow_dispatch'
      )

    env:
      EB_APP: mimir
      EB_ENV_A: mimir-prod
      EB_ENV_B: mimir-idle
      EB_BUCKET: elasticbeanstalk-us-east-1-${{ vars.AWS_ACCOUNT_ID }}
      S3_BACKUP_BUCKET: ${{ vars.S3_BACKUP_BUCKET || 'mimir-db-backups-411113550285' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to AWS ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute version label
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          BRANCH=$(echo "${GITHUB_REF_NAME}" | tr '/' '-')
          SUFFIX="${BRANCH}-${SHORT_SHA}"
          echo "suffix=${SUFFIX}" >> $GITHUB_OUTPUT
          echo "label=v-${SUFFIX}-r${{ github.run_number }}" >> $GITHUB_OUTPUT
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "revision=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          else
            echo "revision=${SUFFIX}" >> $GITHUB_OUTPUT
          fi

      - name: Generate docker-compose.yml from template
        env:
          IMAGE_WEB: ${{ steps.ecr-login.outputs.registry }}/mimir:${{ steps.version.outputs.suffix }}
        run: |
          envsubst '$IMAGE_WEB' < deploy/docker-compose.tmpl.yml > docker-compose.yml
          echo "=== Deployment manifest ===" && cat docker-compose.yml

      - name: Package deployment bundle
        run: zip -j deploy-bundle.zip docker-compose.yml

      - name: Deploy to idle env + staging smoke
        id: deploy
        env:
          EB_APP: ${{ env.EB_APP }}
          EB_ENV_A: ${{ env.EB_ENV_A }}
          EB_ENV_B: ${{ env.EB_ENV_B }}
          EB_BUCKET: ${{ env.EB_BUCKET }}
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_SUFFIX: ${{ steps.version.outputs.suffix }}
          VERSION_LABEL: ${{ steps.version.outputs.label }}
          GIT_REVISION: ${{ steps.version.outputs.revision }}
          DEPLOY_BUNDLE_PATH: deploy-bundle.zip
          # GitHub PAT for the in-app Feedback widget (Issues: write on phainestai/mimir).
          # Store as repo secret GH_BUG_REPORT_TOKEN. If absent, the existing EB value is kept.
          GH_BUG_REPORT_TOKEN: ${{ secrets.GH_BUG_REPORT_TOKEN }}
          S3_BACKUP_BUCKET: ${{ env.S3_BACKUP_BUCKET }}
        run: bash scripts/deploy-idle.sh

      - name: Deployment summary
        if: always()
        run: |
          echo "## 🛸 Idle EB Deployment — ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Version label** | \`${{ steps.version.outputs.label }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Revision** | \`${{ steps.version.outputs.revision }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Web image** | \`${{ steps.ecr-login.outputs.registry }}/mimir:${{ steps.version.outputs.suffix }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **MCP image** | \`${{ env.DOCKERHUB_IMAGE }}:${{ steps.version.outputs.suffix }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next step:** run \`make swap\` locally, or trigger the **Promote to Production** workflow after reviewing the idle URL." >> $GITHUB_STEP_SUMMARY
