name: Build and Deploy Mimir

on:
  push:
    branches:
      - main
      - 'release/**'
      - 'feat/**'
  pull_request:
    branches: [main, 'release/**']
  release:
    types: [published]
  workflow_dispatch:

env:
  # Docker Hub — public MCP facade image (secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN)
  DOCKERHUB_IMAGE: featurefactory/mimir-mcp
  # AWS ECR — activate by setting AWS_ACCOUNT_ID and AWS_REGION as repository variables (web image only)
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}

jobs:
  # ── 1. Tests ──────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    env:
      MIMIR_ENV: test
      DJANGO_SETTINGS_MODULE: mimir.settings

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov pytest-html

      - name: Run database migrations
        run: python manage.py migrate --noinput

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --ignore=tests/e2e \
            --ignore=tests/integration/test_mcp_server_acceptance.py \
            --ignore=tests/integration/test_mcp_facade.py \
            --ignore=tests/integration/test_mcp_e2e_all_tools.py \
            --ignore=tests/unit/test_activity_graph_service.py \
            --cov=. \
            --cov-report=html \
            --cov-report=term \
            --cov-report=xml \
            --html=report.html \
            --self-contained-html

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: github.event_name != 'pull_request'
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-mimir

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            report.html
            htmlcov/

      - name: Comment PR with test results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const testStatus = '${{ job.status }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const comment = `## 🧪 Test Results\n\n**Status:** ${testStatus === 'success' ? '✅ All tests passed' : '❌ Tests failed'}\n\n[View full test report](${runUrl})\n\n**Coverage report** is available in the artifacts.`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # ── 2. Build and push both Docker images ─────────────────────────────────
  build-and-push:
    name: Build and Push Docker Images
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'release' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Docker Hub (MCP facade) ───────────────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── AWS ECR (optional — enabled when AWS_ACCOUNT_ID variable is set) ──
      - name: Configure AWS credentials
        if: vars.AWS_ACCOUNT_ID != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to AWS ECR
        if: vars.AWS_ACCOUNT_ID != ''
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # ── Shared tag suffix ─────────────────────────────────────────────────
      - name: Compute image tag suffix
        id: tag
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          BRANCH=$(echo "${GITHUB_REF_NAME}" | tr '/' '-')
          echo "suffix=${BRANCH}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          if [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
            echo "latest=true" >> $GITHUB_OUTPUT
          else
            echo "latest=false" >> $GITHUB_OUTPUT
          fi

      # ── Web image (Dockerfile) — private ECR only ─────────────────────────
      - name: Build and push web image → ECR
        if: vars.AWS_ACCOUNT_ID != ''
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/mimir:${{ steps.tag.outputs.suffix }}
            ${{ steps.tag.outputs.latest == 'true' && format('{0}/mimir:latest', steps.ecr-login.outputs.registry) || '' }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max
          platforms: linux/amd64,linux/arm64

      # ── MCP facade image (Dockerfile.mcp) — Docker Hub ───────────────────────
      - name: Build and push MCP facade image → Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.mcp
          push: true
          tags: |
            ${{ env.DOCKERHUB_IMAGE }}:${{ steps.tag.outputs.suffix }}
            ${{ steps.tag.outputs.latest == 'true' && format('{0}:latest', env.DOCKERHUB_IMAGE) || '' }}
          cache-from: type=gha,scope=mcp-facade
          cache-to: type=gha,scope=mcp-facade,mode=max
          platforms: linux/amd64,linux/arm64

      # ── Deployment summary ────────────────────────────────────────────────
      - name: Create deployment summary
        run: |
          TAG="${{ steps.tag.outputs.suffix }}"
          echo "## 🚀 Docker Images Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Docker Hub (MCP facade) | Private ECR (web only) |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------------------------|-------------------------|" >> $GITHUB_STEP_SUMMARY
          echo "| **web** | — | \`${{ vars.AWS_ACCOUNT_ID != '' && format('{0}/mimir:{1}', steps.ecr-login.outputs.registry, steps.tag.outputs.suffix) || 'not configured' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **mcp-facade** | \`${{ env.DOCKERHUB_IMAGE }}:${TAG}\` | — |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Quick start with docker compose:**" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker compose up -d" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ── 3. Deploy to AWS Elastic Beanstalk ───────────────────────────────────
  deploy-to-eb:
    name: Deploy to Elastic Beanstalk (mimir-blue)
    needs: build-and-push
    runs-on: ubuntu-latest
    # Prevent concurrent EB deploys — queue them so only one runs at a time.
    concurrency:
      group: eb-deploy-mimir-blue
      cancel-in-progress: false
    # Only deploy from release branches, published releases, or manual dispatch.
    # AWS_ACCOUNT_ID variable must be set; feat/** pushes intentionally excluded.
    if: >
      vars.AWS_ACCOUNT_ID != '' && (
        (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/release/')) ||
        github.event_name == 'release' ||
        github.event_name == 'workflow_dispatch'
      )

    env:
      EB_APP: mimir
      EB_ENV: mimir-blue
      EB_BUCKET: elasticbeanstalk-us-east-1-${{ vars.AWS_ACCOUNT_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to AWS ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute version label
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          BRANCH=$(echo "${GITHUB_REF_NAME}" | tr '/' '-')
          SUFFIX="${BRANCH}-${SHORT_SHA}"
          echo "suffix=${SUFFIX}" >> $GITHUB_OUTPUT
          # Include run_number so retries produce a unique label
          echo "label=v-${SUFFIX}-r${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Generate docker-compose.yml from template
        env:
          IMAGE_WEB: ${{ steps.ecr-login.outputs.registry }}/mimir:${{ steps.version.outputs.suffix }}
          IMAGE_MCP: ${{ env.DOCKERHUB_IMAGE }}:${{ steps.version.outputs.suffix }}
        run: |
          envsubst '$IMAGE_WEB $IMAGE_MCP' < deploy/docker-compose.tmpl.yml > docker-compose.yml
          echo "=== Deployment manifest ===" && cat docker-compose.yml

      - name: Package deployment bundle
        run: zip -j deploy-bundle.zip docker-compose.yml

      - name: Upload bundle to S3
        id: upload
        run: |
          KEY="mimir/${{ steps.version.outputs.label }}/deploy-bundle.zip"
          aws s3 cp deploy-bundle.zip "s3://${{ env.EB_BUCKET }}/${KEY}"
          echo "s3_key=${KEY}" >> $GITHUB_OUTPUT

      - name: Create EB application version
        run: |
          # Idempotent: skip if version already exists (e.g. workflow re-run).
          EXISTS=$(aws elasticbeanstalk describe-application-versions \
            --application-name "${{ env.EB_APP }}" \
            --version-labels "${{ steps.version.outputs.label }}" \
            --query "length(ApplicationVersions)" --output text)
          if [ "${EXISTS}" = "0" ]; then
            aws elasticbeanstalk create-application-version \
              --application-name "${{ env.EB_APP }}" \
              --version-label "${{ steps.version.outputs.label }}" \
              --source-bundle S3Bucket="${{ env.EB_BUCKET }}",S3Key="${{ steps.upload.outputs.s3_key }}"
          else
            echo "Version ${{ steps.version.outputs.label }} already exists — skipping creation."
          fi

      - name: Deploy to EB environment
        run: |
          aws elasticbeanstalk update-environment \
            --application-name "${{ env.EB_APP }}" \
            --environment-name "${{ env.EB_ENV }}" \
            --version-label "${{ steps.version.outputs.label }}"

      - name: Wait for deployment to complete
        run: |
          echo "Polling ${{ env.EB_ENV }} every 15s (max 10 min)..."
          for i in $(seq 1 40); do
            STATUS=$(aws elasticbeanstalk describe-environments \
              --application-name "${{ env.EB_APP }}" \
              --environment-names "${{ env.EB_ENV }}" \
              --query "Environments[0].Status" --output text)
            HEALTH=$(aws elasticbeanstalk describe-environments \
              --application-name "${{ env.EB_APP }}" \
              --environment-names "${{ env.EB_ENV }}" \
              --query "Environments[0].Health" --output text)
            echo "  [${i}/40] Status=${STATUS}  Health=${HEALTH}"
            if [ "${STATUS}" = "Ready" ]; then
              echo "Deployment complete."
              [ "${HEALTH}" = "Red" ] && { echo "Environment health is Red — check EB events"; exit 1; }
              exit 0
            fi
            sleep 15
          done
          echo "Timed out (10 min) waiting for environment to become Ready."
          exit 1

      - name: Deployment summary
        if: always()
        run: |
          LABEL="${{ steps.version.outputs.label }}"
          ENV_URL="https://console.aws.amazon.com/elasticbeanstalk/home?region=us-east-1#/environment/dashboard?applicationName=mimir&environmentId=${{ env.EB_ENV }}"
          echo "## 🛸 EB Deployment — ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Version label** | \`${LABEL}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | \`${{ env.EB_ENV }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Web image** | \`${{ steps.ecr-login.outputs.registry }}/mimir:${{ steps.version.outputs.suffix }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **MCP image** | \`${{ env.DOCKERHUB_IMAGE }}:${{ steps.version.outputs.suffix }}\` |" >> $GITHUB_STEP_SUMMARY
