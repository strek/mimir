{% extends "base.html" %}
{% block title %}New PIP — Mimir{% endblock %}
{% block content %}
<div class="container mt-4" data-testid="pip-create-page">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="{% url 'pip_list' %}">PIPs</a></li>
            <li class="breadcrumb-item active">New</li>
        </ol>
    </nav>
    <h1 class="h3">Create PIP</h1>
    <form method="post" class="mt-3" data-testid="pip-create-form">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label" for="id_playbook">Target playbook (released only)</label>
            <select class="form-select" name="playbook" id="id_playbook" required data-testid="pip-create-playbook">
                <option value="">— Select playbook —</option>
                {% for pb in released_playbooks %}
                <option value="{{ pb.pk }}"
                        {% if prefill_playbook_id == pb.pk %}selected{% endif %}>
                    {{ pb.name }} (v{{ pb.version }})
                </option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label" for="id_title">Title</label>
            <input class="form-control" type="text" name="title" id="id_title" required maxlength="200"
                   data-testid="pip-create-title"/>
        </div>
        <div class="mb-3">
            <label class="form-label" for="id_summary">Summary (optional)</label>
            <textarea class="form-control" rows="3" name="summary" id="id_summary"></textarea>
        </div>
        <button type="submit" class="btn btn-primary" data-testid="pip-create-submit">Save draft &amp; add changes</button>
        <a href="{% url 'pip_list' %}" class="btn btn-outline-secondary">Cancel</a>
    </form>
</div>
<script>console.log('PIP create form ready');</script>
{% endblock %}
